apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-user
  annotations:
    policies.kyverno.io/title: Disallow Root User
    policies.kyverno.io/category: Security Baseline
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Containers must not run as root (UID 0). Every container must set
      securityContext.runAsNonRoot: true. This prevents privilege escalation
      and limits blast radius if the container process is compromised.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - devops-challenge
      validate:
        message: >-
          Containers must not run as root. Set securityContext.runAsNonRoot: true
          on the pod or container spec.
        pattern:
          spec:
            # Check pod-level first (our deployment sets it here)
            securityContext:
              runAsNonRoot: true
            containers:
              # Each container must also not allow privilege escalation.
              - securityContext:
                  allowPrivilegeEscalation: false